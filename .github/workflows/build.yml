name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: linux
          - platform: windows-latest
            label: windows
          - platform: macos-latest
            label: macos

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ./src-tauri -> target

      - name: Build frontend
        run: |
          npm --prefix client ci
          npm --prefix client run build

      - name: Build and release with Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: DSHub ${{ github.ref_name }}
          releaseBody: |
            ## Installation

            | Platform | File |
            |----------|------|
            | Linux (deb) | `DSHub_*_amd64.deb` |
            | Linux (rpm) | `DSHub-*.x86_64.rpm` |
            | Linux (binary) | `dshub-linux-x86_64.zip` |
            | Windows | `DSHub_*_x64-setup.exe` |
            | macOS | `DSHub_*.dmg` |

            See [QUICK_START.md](https://github.com/skjafar/dshub/blob/tauri/QUICK_START.md) for installation instructions.
          releaseDraft: false
          prerelease: false

      - name: Zip Linux binary
        if: matrix.platform == 'ubuntu-22.04'
        run: zip src-tauri/target/release/dshub-linux-x86_64.zip src-tauri/target/release/dshub

      - name: Upload Linux binary zip to release
        if: matrix.platform == 'ubuntu-22.04'
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/dshub-linux-x86_64.zip
